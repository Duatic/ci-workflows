name: ROS industrial_ci
# original author: Denis Štogl <denis@stoglrobotics.de>
# Central, org-wide reusable workflow for building ROS 2 packages with industrial_ci.
# Builds ONE distro/channel combination. Not meant to be called directly by product repos —
# use ci_orchestrator.yml, which drives this per distro with the matrix/gating logic.

on:
  workflow_call:
    inputs:
      ros_distro:
        description: 'ROS_DISTRO variable for industrial_ci'
        required: true
        type: string
      ros_repo:
        description: 'ROS_REPO to run for industrial_ci. Possible values: "main", "testing"'
        default: 'main'
        required: false
        type: string
      timeout_minutes:
        description: 'Maximum time the job is allowed to run.'
        default: 30
        required: false
        type: number
      ccache_dir:
        description: 'CCache dir that should be used. Relative to github.workspace'
        default: '.ccache'
        required: false
        type: string
      runner:
        description: 'Runner label(s) to run the job on, e.g. "ubuntu-latest" or "self-hosted".'
        default: 'ubuntu-latest'
        required: false
        type: string
    secrets:
      CI_PAT:
        description: 'Optional PAT used to clone private upstream dependencies listed in the repos.list workspace file.'
        required: false

jobs:
  ici:
    name: ${{ inputs.ros_distro }} ${{ inputs.ros_repo }}
    timeout-minutes: ${{ inputs.timeout_minutes }}
    runs-on: ${{ inputs.runner }}
    env:
      CCACHE_DIR: ${{ github.workspace }}/${{ inputs.ccache_dir }}
    steps:
      - name: Checkout
        uses: actions/checkout@v7
      - name: Detect upstream workspace, extra apt dependencies, and pip requirements
        id: detect
        run: |
          if [ -f repos.list ]; then
            echo "upstream_workspace=repos.list" >> "$GITHUB_OUTPUT"
          else
            echo "upstream_workspace=" >> "$GITHUB_OUTPUT"
          fi
          if [ -f .github/ci/apt_dependencies ]; then
            packages=$(grep -v '^\s*#' .github/ci/apt_dependencies | tr '\n' ' ')
            echo "before_install=sudo apt-get install -y -qq ${packages}" >> "$GITHUB_OUTPUT"
          else
            echo "before_install=" >> "$GITHUB_OUTPUT"
          fi
          if [ -f requirements.txt ]; then
            echo "pip_install=python3 -m pip install --break-system-packages -r requirements.txt" >> "$GITHUB_OUTPUT"
          else
            echo "pip_install=" >> "$GITHUB_OUTPUT"
          fi
      - name: Cache ccache
        uses: actions/cache@v6
        with:
          path: ${{ env.CCACHE_DIR }}
          key: ccache-${{ inputs.ros_distro }}-${{ steps.detect.outputs.upstream_workspace }}-${{ inputs.ros_repo }}-${{ github.job }}-${{ github.sha }}-${{ github.run_id }}
          restore-keys: |
            ccache-${{ inputs.ros_distro }}-${{ steps.detect.outputs.upstream_workspace }}-${{ inputs.ros_repo }}-${{ github.job }}-${{ github.sha }}
            ccache-${{ inputs.ros_distro }}-${{ steps.detect.outputs.upstream_workspace }}-${{ inputs.ros_repo }}-${{ github.job }}
      # TEMPORARY: diagnosing a self-hosted-runner hang inside industrial_ci's colcon_setup
      # apt-get step (duatic_skills#13). Remove once root-caused.
      - name: DEBUG - host resources before industrial_ci
        run: |
          echo "== df -h =="; df -h
          echo "== free -h =="; free -h
          echo "== docker system df =="; docker system df -v || true
      - name: DEBUG - start background resource monitor
        run: |
          ( while true; do
              { date -u +%FT%TZ; df -h /; free -h; echo '---'; } >> /tmp/resource-monitor.log
              for cid in $(docker ps -q); do
                { echo "== docker exec $cid ps auxf =="; docker exec "$cid" ps auxf 2>&1; echo '---'; } >> /tmp/container-procs.log
              done
              sleep 15
            done ) &
          echo $! > /tmp/monitor.pid
      - uses: 'ros-industrial/industrial_ci@master'
        env:
          UPSTREAM_WORKSPACE: ${{ steps.detect.outputs.upstream_workspace }}
          ROS_DISTRO: ${{ inputs.ros_distro }}
          ROS_REPO: ${{ inputs.ros_repo }}
          BEFORE_INSTALL_UPSTREAM_DEPENDENCIES: ${{ steps.detect.outputs.before_install }}
          AFTER_INSTALL_TARGET_DEPENDENCIES: ${{ steps.detect.outputs.pip_install }}
          BEFORE_INIT: ${{ secrets.CI_PAT != '' && format('apt-get update -qq && apt-get install -y -qq git && git config --global url."https://{0}@github.com/".insteadOf "https://github.com/"', secrets.CI_PAT) || '' }}
      - name: DEBUG - stop background resource monitor
        if: always()
        run: kill "$(cat /tmp/monitor.pid)" 2>/dev/null || true
      - name: DEBUG - host resources after industrial_ci
        if: always()
        run: |
          echo "== df -h =="; df -h
          echo "== free -h =="; free -h
          echo "== docker system df =="; docker system df -v || true
      - name: DEBUG - upload resource monitor log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: resource-monitor-${{ inputs.ros_distro }}-${{ inputs.ros_repo }}
          path: |
            /tmp/resource-monitor.log
            /tmp/container-procs.log
          if-no-files-found: ignore
